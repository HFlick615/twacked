<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWACKED | Mobile Party Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="p1-turn">

    <audio id="sound-click" src="click.mp3" preload="auto"></audio>
    <audio id="sound-laugh" src="laugh.mp3" preload="auto"></audio>

    <div id="overlay" class="overlay">
        <div class="modal">
            <h1 id="modal-title" class="logo-text">TWACKED</h1>
            <div id="modal-content" class="rules-container">
                <h2>HOW TO PLAY</h2>
                <ul>
                    <li><span class="num">1</span> 2-Player competitive mode.</li>
                    <li><span class="num">2</span> Pick until you find a&nbsp;<strong>MATCH</strong>.</li>
                    <li><span class="num">3</span> A match switches the&nbsp;<strong>TURN</strong>.</li>
                    <li><span class="num">4</span> Avoid the&nbsp;<strong>CLOWN</strong>&nbsp;or take a&nbsp;<strong>SHOT</strong>.</li>
                </ul>
            </div>
            <button id="modal-btn" class="start-btn" onclick="startGame()">START SESSION</button>
        </div>
    </div>

    <header>
        <h1 id="status-text" class="turn-indicator">PLAYER 1: YOUR TURN</h1>
    </header>

    <main id="game-board"></main>

    <footer>
        <button class="control-btn" onclick="triggerReset()">RESET BOARD</button>
    </footer>

    <script src="script.js"></script>
</body>
</html>
